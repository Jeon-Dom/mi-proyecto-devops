version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: devops_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - devops_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_container
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@devops.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - devops_network

  web:
    build: ./app
    container_name: flask_app
    ports:
      - "5000:5000"
    environment:
      - APP_NAME=Sistema de Inventario DevOps
      - APP_VERSION=1.0.0
      - DB_HOST=db
      - DB_NAME=devops_db
      - DB_USER=postgres
      - DB_PASSWORD=supersecretpassword
    depends_on:
      - db
    networks:
      - devops_network

volumes:
  postgres_data:

networks:
  devops_network:
    driver: bridge